name: Build TropiCalc

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}
        shell: bash

      - name: Pousser le log en cas d'échec
        if: failure()
        run: |
          git config user.name ci-log
          git config user.email ci@log
          git checkout --orphan ci-log
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add -f build-output.log
          git commit -q -m "log de build $GITHUB_SHA"
          git push -f origin ci-log 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}
        shell: bash

      - name: Publier les erreurs dans le résumé
        if: failure()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "e: |error:|FAILED|What went wrong|Caused by|Could not" build-output.log | head -40 >> $GITHUB_STEP_SUMMARY
          echo '---- tail ----' >> $GITHUB_STEP_SUMMARY
          tail -30 build-output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY 2>&1 | tee build-output.log; exit ${PIPESTATUS[0]}
        shell: bash

      - name: Publier les erreurs dans le résumé
        if: failure()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "e: |error:|FAILED|What went wrong|Caused by|Could not" build-output.log | head -40 >> $GITHUB_STEP_SUMMARY
          echo '---- tail ----' >> $GITHUB_STEP_SUMMARY
          tail -30 build-output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tropicalc-build
          path: build/libs/*.jar
